name: Setup Bun dependencies
description: Install Bun (pinned), restore/save dependency cache, then bun install --frozen-lockfile.

runs:
  using: composite
  steps:
    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        # Caches the Bun binary via setup-bun post step (not project node_modules).
        bun-version: latest

    - name: Restore Bun dependency cache
      uses: actions/cache@v4
      id: bun-deps-cache
      with:
        path: |
          ~/.bun/install/cache
          node_modules
          node_modules/.tmp
        key: bun-deps-${{ runner.os }}-${{ hashFiles('bun.lock') }}
        restore-keys: |
          bun-deps-${{ runner.os }}-

    - name: Install dependencies
      run: bun install --frozen-lockfile
      shell: bash
