name: Setup Apple code signing
description: Import Developer ID .p12 and App Store Connect API key for Tauri macOS sign + notarize.

runs:
  using: composite
  steps:
    - name: Import signing certificate
      shell: bash
      env:
        APPLE_CERTIFICATE: ${{ env.APPLE_CERTIFICATE }}
        APPLE_CERTIFICATE_PASSWORD: ${{ env.APPLE_CERTIFICATE_PASSWORD }}
        KEYCHAIN_PASSWORD: ${{ env.KEYCHAIN_PASSWORD }}
      run: |
        set -euo pipefail
        if [ -z "${APPLE_CERTIFICATE:-}" ]; then
          echo "error: APPLE_CERTIFICATE is not set (add GitHub secret; see CLAUDE.md Release workflow)" >&2
          exit 1
        fi
        echo "$APPLE_CERTIFICATE" | base64 --decode > "$RUNNER_TEMP/certificate.p12"
        security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
        security default-keychain -s build.keychain
        security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
        security set-keychain-settings -t 3600 -u build.keychain
        security import "$RUNNER_TEMP/certificate.p12" -k build.keychain \
          -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
        security set-key-partition-list -S apple-tool:,apple:,codesign: -s \
          -k "$KEYCHAIN_PASSWORD" build.keychain
        security find-identity -v -p codesigning build.keychain

    - name: Install App Store Connect API key
      shell: bash
      env:
        APPLE_API_KEY: ${{ env.APPLE_API_KEY }}
        APPLE_API_KEY_CONTENT: ${{ env.APPLE_API_KEY_CONTENT }}
      run: |
        set -euo pipefail
        if [ -z "${APPLE_API_KEY:-}" ] || [ -z "${APPLE_API_KEY_CONTENT:-}" ]; then
          echo "error: APPLE_API_KEY and APPLE_API_KEY_CONTENT must be set" >&2
          exit 1
        fi
        mkdir -p "$HOME/.appstoreconnect/private_keys"
        KEY_PATH="$HOME/.appstoreconnect/private_keys/AuthKey_${APPLE_API_KEY}.p8"
        printf '%s' "$APPLE_API_KEY_CONTENT" > "$KEY_PATH"
        echo "APPLE_API_KEY_PATH=$KEY_PATH" >> "$GITHUB_ENV"
