name: Changelog

on:
  pull_request:

permissions:
  contents: read

jobs:
  changelog:
    name: Changelog updated
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify Upcoming changelog entries
        env:
          GITHUB_BASE_REF: ${{ github.event.pull_request.base.ref }}
          GITHUB_HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: ./tool/check_changelog_pr.sh "origin/${{ github.event.pull_request.base.ref }}"
