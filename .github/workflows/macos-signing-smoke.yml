# TEMPORARY — delete this file before merging the macOS signing PR.
# Dry-run of the publish workflow's macOS sign + notarize path (no GitHub release).
name: macOS signing smoke (temp)

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/macos-signing-smoke.yml
      - .github/workflows/publish.yml
      - .github/actions/setup-apple-signing/**
      - .github/actions/setup-bun-deps/**
      - .github/actions/setup-rust-tauri/**
      - src-tauri/**
      - package.json
      - bun.lock
  workflow_dispatch:

concurrency:
  group: macos-signing-smoke-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  macos-signing-smoke:
    name: macOS sign + notarize (smoke)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun dependencies
        uses: ./.github/actions/setup-bun-deps

      - name: Setup Rust for Tauri
        uses: ./.github/actions/setup-rust-tauri
        with:
          cache-key: macOS-smoke

      - name: Sync version from package.json
        run: bun tool/sync-version.ts

      - name: Setup Apple signing
        uses: ./.github/actions/setup-apple-signing
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY_CONTENT }}

      - name: Build Tauri app (signed + notarized)
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
        run: bun run tauri build

      - name: Verify codesign and Gatekeeper
        shell: bash
        run: |
          set -euo pipefail
          APP="$(find src-tauri/target/release/bundle/macos -maxdepth 1 -name '*.app' -type d | head -1)"
          DMG="$(find src-tauri/target/release/bundle/dmg -maxdepth 1 -name '*.dmg' -type f | head -1)"
          if [ -z "$APP" ]; then
            echo "error: no .app under src-tauri/target/release/bundle/macos" >&2
            find src-tauri/target/release/bundle -type f 2>/dev/null || true
            exit 1
          fi
          echo "App: $APP"
          codesign -dv --verbose=2 "$APP" 2>&1
          spctl -a -vv "$APP" 2>&1 | tee spctl-app.txt
          grep -q "accepted" spctl-app.txt
          grep -q "Notarized Developer ID" spctl-app.txt || grep -q "Developer ID" spctl-app.txt
          if [ -n "$DMG" ]; then
            echo "DMG: $DMG"
            xcrun stapler validate "$DMG" 2>&1 || true
            spctl -a -vv -t open "$DMG" 2>&1 | tee spctl-dmg.txt
            grep -q "accepted" spctl-dmg.txt
          else
            echo "warning: no .dmg found (app verification still passed)" >&2
          fi
          ls -la src-tauri/target/release/bundle/macos/ src-tauri/target/release/bundle/dmg/ 2>/dev/null || true
